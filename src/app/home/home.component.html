<!-- ===== Hero Intro tile (首屏，满足 AC-2：不以公司为主角) ===== -->
<ui-hero-intro
  primaryLabel="浏览全部应用"
  appsAnchor="apps"
  [featuredAppSlug]="''"
  [featuredAppLabel]="''"
></ui-hero-intro>

<!-- ===== App Gallery tiles（画廊式，满足 AC-1、AC-12） ===== -->
<!-- 节奏：calendar(dark) → vision-cue(light) → shanying(parchment) -->
<!-- 数据来自 AppCatalogService HTTP，顺序由 catalog 决定（满足 AC-2） -->
<div id="apps">

  <!-- 加载中骨架屏（极简灰块，不引 ng-zorro spinner） -->
  <ng-container *ngIf="apps$ | async as apps; else loadingOrError">
    <ui-product-tile
      *ngFor="let app of apps; let i = index"
      [app]="app"
      [layout]="getTileLayout(i)"
    ></ui-product-tile>
  </ng-container>

  <ng-template #loadingOrError>
    <ng-container *ngIf="loadError; else skeletonTpl">
      <div class="apps-load-error">
        应用列表暂时无法加载，请稍后再试
      </div>
    </ng-container>
    <ng-template #skeletonTpl>
      <div class="app-tile-skeleton" *ngFor="let _ of [1,2,3]"></div>
    </ng-template>
  </ng-template>

</div>
