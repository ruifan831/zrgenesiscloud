<div class="product-image__wrapper" [style.aspect-ratio]="aspect ? aspect : null">
  <img
    *ngIf="src"
    class="product-image__img"
    [src]="src"
    [alt]="alt"
    loading="lazy"
    decoding="async"
  />
  <div *ngIf="!src" class="product-image__placeholder" [attr.aria-label]="alt"></div>
</div>
