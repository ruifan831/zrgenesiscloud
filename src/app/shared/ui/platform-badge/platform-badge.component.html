<a
  [href]="disabled ? null : href"
  [attr.target]="disabled ? null : '_blank'"
  [attr.rel]="disabled ? null : 'noopener noreferrer'"
  class="platform-badge"
  [ngClass]="[badgeClass, disabled ? 'platform-badge--disabled' : '']"
  [attr.aria-disabled]="disabled || null"
  [attr.aria-label]="displayLabel"
  (click)="onBadgeClick($event)"
>
  <!-- Badge icon area -->
  <span class="platform-badge__icon" [attr.aria-hidden]="true">

    <!-- App Store icon -->
    <ng-container *ngIf="badge === 'appstore'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701"/>
      </svg>
    </ng-container>

    <!-- Google Play icon -->
    <ng-container *ngIf="badge === 'google-play'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M3.18 23.76a2.5 2.5 0 0 1-1.18-2.1V2.34a2.5 2.5 0 0 1 1.18-2.1l11.37 11.76L3.18 23.76zM20.49 10.2l-2.76-1.55L14.61 12l3.12 3.35 2.76-1.55a2.04 2.04 0 0 0 0-3.6zM4.63.4l11.06 11.44-2.96 3.07L4.63.4zm0 23.2l8.1-14.51-2.96 3.07L4.63 23.6z"/>
      </svg>
    </ng-container>

    <!-- APK icon (download arrow) -->
    <ng-container *ngIf="badge === 'apk'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </ng-container>

    <!-- 应用宝 icon (Android robot) -->
    <ng-container *ngIf="badge === 'tencent-myapp'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M17.523 15.3414c-.5511 0-.9993-.4486-.9993-.9997s.4482-.9993.9993-.9993c.5511 0 .9993.4482.9993.9993.0001.5511-.4482.9997-.9993.9997m-11.046 0c-.5511 0-.9993-.4486-.9993-.9997s.4482-.9993.9993-.9993c.5511 0 .9993.4482.9993.9993 0 .5511-.4483.9997-.9993.9997m11.4045-6.02l1.9973-3.4592a.416.416 0 0 0-.1521-.5676.416.416 0 0 0-.5676.1521l-2.0223 3.503C15.5902 8.2439 13.8533 7.8508 12 7.8508s-3.5902.3931-5.1367 1.0989L4.841 5.4461a.4161.4161 0 0 0-.5677-.1521.4157.4157 0 0 0-.1521.5676l1.9973 3.4592C2.6889 11.1867.3432 14.6589 0 18.761h24c-.3435-4.1021-2.6892-7.5743-6.1185-9.4396"/>
      </svg>
    </ng-container>

    <!-- WeChat Mini Program icon -->
    <ng-container *ngIf="badge === 'wechat-mp'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.295.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.602-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.746 4.209 6.888 4.209.809 0 1.593-.107 2.317-.307a.864.864 0 0 1 .718.098l1.33.786a.294.294 0 0 0 .147.047c.165 0 .3-.134.3-.3 0-.065-.027-.13-.044-.194l-.343-1.203a.59.59 0 0 1 .185-.567c1.512-1.208 2.537-2.944 2.537-4.883 0-3.723-3.276-6.663-7.075-6.692zm-2.207 3.29c.527 0 .951.438.951.979a.965.965 0 0 1-.951.979.965.965 0 0 1-.951-.979c0-.541.426-.979.951-.979zm4.42 0c.526 0 .951.438.951.979a.965.965 0 0 1-.951.979.965.965 0 0 1-.951-.979c0-.541.424-.979.951-.979z"/>
      </svg>
    </ng-container>

    <!-- Web icon (globe) -->
    <ng-container *ngIf="badge === 'web'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    </ng-container>

  </span>

  <!-- Label area -->
  <span class="platform-badge__text">
    <span class="platform-badge__label">{{ displayLabel }}</span>
    <span class="platform-badge__sublabel" *ngIf="subLabel">{{ subLabel }}</span>
    <span class="platform-badge__disabled-tag" *ngIf="disabled">即将推出</span>
  </span>
</a>
