<div class="contact-page surface-light">

  <!-- 单屏内容区 -->
  <div class="contact-page__content">
    <p class="type-eyebrow">联系我们</p>
    <h1 class="contact-page__title">有问题？<br>欢迎写信给我们。</h1>
    <p class="contact-page__lead">
      我们通常在 1–2 个工作日内回复。如果您对某款应用有反馈或合作意向，请在邮件中说明。
    </p>
    <a [href]="'mailto:' + contactEmail" class="contact-page__email-link">
      {{ contactEmail }}
    </a>
    <a [href]="'mailto:' + contactEmail" class="contact-page__cta">
      发送邮件
    </a>
  </div>

</div>
